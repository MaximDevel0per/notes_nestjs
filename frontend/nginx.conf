server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Statische Dateien ausliefern. Der Fallback auf index.html sorgt dafür,
  # dass ein Reload auf einer Unterseite nicht in einem 404 endet –
  # wichtig, sobald du später einen Router einbaust.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Alles unter /api geht an den Backend-Container.
  # "backend" ist der Servicename aus docker-compose.yml – Docker löst
  # den intern zur Container-IP auf.
  # Der Slash am Ende von proxy_pass schneidet das /api-Präfix ab:
  # /api/todos  ->  http://backend:3000/todos
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
